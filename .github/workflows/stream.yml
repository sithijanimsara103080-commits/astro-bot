name: 24/7 Car Crushing Reverse Streamer (Fixed Bot Error)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install System Dependencies & FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Run Single Custom Stream
      env:
        KEY_2: "6j63-es9v-kvq1-wmry-66g2"
      run: |
        # 🎯 yt-dlp මඟුල් මුකුත් නැහැ. කෙළින්ම Cloud එකේ තියෙන Direct MP4 ලින්ක් එකක් පාවිච්චි කරන්නේ.
        # (මෙතනට උඹේම වීඩියෝ එකක Google Drive Direct Link එකක් වුණත් පස්සේ දාන්න පුළුවන්)
        VIDEO_URL="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
        
        # 🎵 කෝපිරයිට් නැති බැක්ග්‍රවුන්ඩ් සින්දුව
        BG_MUSIC="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        
        HLS_URL="https://a.upload.youtube.com/http_upload_hls?cid=$KEY_2&copy=0&file=live.m3u8"
        
        echo "🚀 යූටියුබ් බොට් බ්ලොක් එක බයිපාස් කරලා කෙළින්ම ස්ට්‍රීම් එක තල්ලු කරනවා..."
        
        # 🎯 FFmpeg Magic: ලූප් කරනවා, රිවර්ස් කරනවා, වර්ටිකල් ක්‍රොප් කරනවා, සින්දුව මික්ස් කරනවා
        ffmpeg -re -stream_loop -1 -i "$VIDEO_URL" -stream_loop -1 -i "$BG_MUSIC" \
          -filter_complex "[0:v]reverse,crop=ih*9/16:ih,scale=1080:1920[v];[1:a]volume=0.8[bg]" \
          -map "[v]" -map "[bg]" -vcodec libx264 -pix_fmt yuv420p -preset ultrafast -r 30 -g 60 -b:v 3000k \
          -acodec aac -b:a 128k -f hls -hls_time 2 -hls_list_size 5 -hls_flags delete_segments -method POST "$HLS_URL"
