    - name: Download & Setup Files
      run: |
        # 🚗 [KEY 2 සඳහා] - Car Crushing Reverse Video + Music
        echo "📥 Downloading Video for Key 2..."
        yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]" --merge-output-format mp4 "https://www.youtube.com/watch?v=QhYAr74CuMs" -o "video.mp4"
        echo "📥 Downloading Music for Key 2..."
        wget -O music.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

        # 🛠️ [KEY 3 සඳහා] - Car Crushing 3 Videos Merged + Music 2
        # (yt-dlp එකෙන්ම වීඩියෝ 3ම බාගෙන, එකම වෙලාවෙ car_merge.mp4 විදියට ලස්සනට එකතු කරනවා)
        echo "📥 Downloading and Merging 3 Videos for Key 3..."
        yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]" --merge-output-format mp4 \
          "https://www.youtube.com/watch?v=77fcAjcF1F4" \
          "https://www.youtube.com/watch?v=wcCV5TnmwqM" \
          "https://www.youtube.com/watch?v=MK1VPyx0gXg" \
          --concat-playlist always -o "car_merge.mp4"
        echo "📥 Downloading Music 2 for Key 3..."
        wget -O music2.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"

        # 🥚 [KEY 4 සඳහා] - Raw Egg Peeling 2 Videos Merged
        echo "📥 Downloading and Merging 2 Videos for Key 4..."
        yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]" --merge-output-format mp4 \
          "https://www.youtube.com/watch?v=ggWDml2qWtY" \
          "https://www.youtube.com/watch?v=PmrrGR7Aohs" \
          --concat-playlist always -o "egg_merge.mp4"

        echo "✅ ඔක්කොම වීඩියෝ සහ සින්දු ටික ඩවුන්ලෝඩ් වෙලා, නියම නමින් රීනේම් වෙලා ඉවරයි මචං!"

    - name: Push Assets to Github Repository
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Security එකට cookies ටික මකනවා
        rm -f cookies.txt
        
        # ඔක්කොම ෆයිල්ස් ටික Repository එකට ඇඩ් කරනවා
        git add video.mp4 music.mp3 car_merge.mp4 music2.mp3 egg_merge.mp4
        git commit -m "Mega Download: Setup all stream assets via Cloud Cookies" || echo "වෙනස්කම් නැත!"
        git push origin main
