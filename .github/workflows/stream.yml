name: Cloud Video & Music Auto Downloader (0% Your Data)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'ලයිව් දාන්න ඕන YouTube වීඩියෝ ලින්ක් එක දාන්න'
        required: true
        default: 'https://www.youtube.com/watch?v=QhYAr74CuMs'
      music_url:
        description: 'කෝපිරයිට් නැති සින්දුවේ Direct MP3 ලින්ක් එක දාන්න'
        required: true
        default: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub එකට ෆයිල්ස් සේව් කරන්න අවසර දෙනවා

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install yt-dlp
      run: |
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Cloud Download Assets
      run: |
        echo "📥 යූටියුබ් වීඩියෝව ක්ලවුඩ් එක ඇතුළෙන්ම බාගත වෙමින් පවතී..."
        # 🎯 වීඩියෝව 720p හෝ 1080p වලින් කෙළින්ම video.mp4 නමින් සර්වර් එකට ගන්නවා
        yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]" --merge-output-format mp4 "${{ github.event.inputs.youtube_url }}" -o "video.mp4"
        
        echo "📥 සින්දුව බාගත වෙමින් පවතී..."
        wget -O music.mp3 "${{ github.event.inputs.music_url }}"

    - name: Save Files into Github Repository (Push)
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add video.mp4 music.mp3
        git commit -m "Auto downloaded assets via Cloud" || echo "වෙනස්කම් කිසිවක් නැත!"
        git push origin main
