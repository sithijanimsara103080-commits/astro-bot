# (උඩ කොටස් ඔක්කොම එහෙම්මම තියෙන්න ඇරලා, Run All 4 Custom Lifetime Streams කියන තැන යට තියෙන Python කේතයේ අන්තිම ටික විතරක් මෙහෙම වෙනස් කරන්න)
    run: |
